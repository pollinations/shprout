<!doctype html>
<meta charset="utf-8">
<title>nodeprout — shprout in Node, in your tab</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<style>
  html, body { margin: 0; height: 100%; background: #111; color: #eee; font: 14px system-ui; }
  #bar { padding: 6px 10px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #333; }
  #bar input { flex: 1; background: #222; color: #eee; border: 1px solid #444; padding: 6px 8px; border-radius: 4px; font: inherit; }
  #bar button { background: #2563eb; color: white; border: 0; padding: 6px 12px; border-radius: 4px; cursor: pointer; font: inherit; }
  #bar button.auth { background: #16a34a; }
  #bar button:disabled { opacity: 0.4; cursor: not-allowed; }
  #term { height: calc(100vh - 44px); padding: 8px; }
</style>

<div id="bar">
  <input id="task" placeholder='task (e.g. "list files, count lines of nodeprout.mjs")' autofocus disabled>
  <button id="go" disabled>Run</button>
  <button id="auth" class="auth" hidden>Authorize</button>
  <span id="status" style="color:#888"></span>
</div>
<div id="term"></div>

<script type="module">
  import { Terminal } from 'https://esm.sh/@xterm/xterm@5.5.0';
  import { FitAddon } from 'https://esm.sh/@xterm/addon-fit@0.10.0';
  import { WebContainer } from 'https://esm.sh/@webcontainer/api@1.5.1';

  const APP_KEY = 'pk_xMe0kHLHGca6k7lf';
  const KEY_STORE = 'shprout.apiKey';
  const POLLI_AUTH = 'https://enter.pollinations.ai/authorize';
  const POLLI_BASE = 'https://gen.pollinations.ai/v1';

  const term = new Terminal({ convertEol: true, fontSize: 13, theme: { background: '#111' } });
  const fit = new FitAddon();
  term.loadAddon(fit);
  term.open(document.getElementById('term'));
  fit.fit();
  addEventListener('resize', () => fit.fit());

  const $ = id => document.getElementById(id);
  const setStatus = s => $('status').textContent = s;
  const log = s => term.write(s + '\r\n');

  const frag = new URLSearchParams(location.hash.slice(1));
  if (frag.get('api_key')) {
    localStorage.setItem(KEY_STORE, frag.get('api_key'));
    history.replaceState(null, '', location.pathname + location.search);
  }
  let apiKey = localStorage.getItem(KEY_STORE);

  $('auth').onclick = () => {
    const u = new URL(POLLI_AUTH);
    u.searchParams.set('app_key', APP_KEY);
    u.searchParams.set('redirect_url', location.origin + location.pathname);
    location.href = u.toString();
  };

  if (!apiKey) {
    $('auth').hidden = false;
    setStatus('not authorized');
    log('\x1b[33mclick "Authorize" to grant nodeprout access to your Pollinations balance (BYOP).\x1b[0m');
  }

  setStatus('booting…');
  log('\x1b[2mbooting WebContainer…\x1b[0m');
  const wc = await WebContainer.boot();
  window.wc = wc;

  log('\x1b[2mfetching nodeprout…\x1b[0m');
  const agent = await fetch('/nodeprout.mjs.txt').then(r => r.text());
  await wc.mount({
    'nodeprout.mjs': { file: { contents: agent } },
    'package.json': { file: { contents: JSON.stringify({
      name: 'nodeprout-workspace', version: '0.0.0', private: true, type: 'module',
    }, null, 2) } },
  });

  setStatus(apiKey ? 'ready' : 'awaiting authorization');
  log('\r\n\x1b[32mWebContainer ready.\x1b[0m' + (apiKey ? ' type a task and hit Run.\r\n' : ' authorize first.\r\n'));

  if (apiKey) { $('task').disabled = false; $('go').disabled = false; $('task').focus(); }

  $('go').onclick = run;
  $('task').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

  async function run() {
    const task = $('task').value.trim();
    if (!task || !apiKey) return;
    $('go').disabled = true; setStatus('running…');
    log(`\r\n\x1b[36m$ ${task}\x1b[0m`);
    const proc = await wc.spawn('node', ['nodeprout.mjs', task], {
      env: {
        OPENAI_API_KEY: apiKey,
        OPENAI_BASE_URL: POLLI_BASE,
        MODEL: 'claude-large',
      },
    });
    proc.output.pipeTo(new WritableStream({ write: c => term.write(c) }));
    const code = await proc.exit;
    log(`\r\n\x1b[2m[exit ${code}]\x1b[0m`);
    setStatus('ready');
    $('go').disabled = false;
    $('task').focus();
  }
</script>
